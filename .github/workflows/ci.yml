name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# Add explicit permissions for packages
permissions:
  contents: read
  packages: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: ShellCheck
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: './setup-kroki-server.sh'

  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Frontend unit tests
        working-directory: ./demoSite
        run: bun test tests/

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Server unit tests
        working-directory: ./demoSite
        run: |
          pip install -r requirements-dev.txt
          python -m pytest tests/test_server.py -q

  test:
    runs-on: ubuntu-latest
    needs: [lint, unit-tests]
    steps:
      - uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Test setup script
        env:
          # Smoke-test against the stock released core (instantly pullable); the
          # GoAT-from-main image is verified separately and isn't needed here.
          KROKI_CORE_IMAGE: yuzutech/kroki:0.30.1
        run: |
          chmod +x ./setup-kroki-server.sh
          ./setup-kroki-server.sh start
          sleep 30
          # Use the HTTPS_PORT from .env file (default 8443)
          HTTPS_PORT=$(grep HTTPS_PORT .env | cut -d '=' -f2 | tr -d ' ' || echo "8443")
          curl -k -s -o /dev/null -w "%{http_code}" https://localhost:${HTTPS_PORT} | grep -q "200"
          ./setup-kroki-server.sh stop
  demo-site-container:
    name: Build Demo Site Docker Image
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}/demosite
          # No bare "latest" here: release.yml owns the latest tag on version
          # releases; main-branch CI builds must not clobber it.
          tags: |
            type=semver,pattern={{version}}
            type=ref,event=branch
            type=sha,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./demoSite
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Add caching to improve build times
          cache-from: type=gha
          cache-to: type=gha,mode=max
