name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# Add explicit permissions for packages
permissions:
  contents: read
  packages: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: ShellCheck
        # Lint setup-kroki-server.sh and any scripts in scripts/ (future ops
        # scripts land there). build-kroki-core.sh is intentionally excluded —
        # it is a separate build tool not covered by this PR.
        run: |
          FILES="setup-kroki-server.sh"
          if compgen -G "scripts/*.sh" > /dev/null 2>&1; then
            FILES="$FILES scripts/*.sh"
          fi
          # shellcheck disable=SC2086
          shellcheck $FILES

  nginx-config:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: default
            env: {}
          - name: public
            env:
              DEPLOY_PROFILE: public
          - name: public-acme
            env:
              DEPLOY_PROFILE: public
              TLS_MODE: acme
    steps:
      - uses: actions/checkout@v6

      - name: Generate nginx.conf (${{ matrix.name }})
        env:
          DEPLOY_PROFILE: ${{ matrix.env.DEPLOY_PROFILE || '' }}
          TLS_MODE: ${{ matrix.env.TLS_MODE || '' }}
        run: |
          chmod +x ./setup-kroki-server.sh
          ./setup-kroki-server.sh genconfig

      - name: Generate dummy ECDSA cert/key
        run: |
          mkdir -p /tmp/nginx-test-certs
          openssl ecparam -name prime256v1 -genkey -noout -out /tmp/nginx-test-certs/nginx.key
          openssl req -new -key /tmp/nginx-test-certs/nginx.key \
            -out /tmp/nginx-test-certs/nginx.csr -subj "/CN=localhost"
          openssl x509 -req -days 1 \
            -in /tmp/nginx-test-certs/nginx.csr \
            -signkey /tmp/nginx-test-certs/nginx.key \
            -out /tmp/nginx-test-certs/nginx.crt
          rm /tmp/nginx-test-certs/nginx.csr

      - name: Validate nginx.conf with nginx -t (${{ matrix.name }})
        run: |
          docker run --rm \
            --add-host demosite:127.0.0.1 \
            --add-host core:127.0.0.1 \
            -v "$(pwd)/nginx.conf:/etc/nginx/nginx.conf:ro" \
            -v "/tmp/nginx-test-certs:/etc/nginx/certs:ro" \
            nginx:1.28-alpine nginx -t

  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Frontend unit tests
        working-directory: ./demoSite
        run: bun test tests/

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Server unit tests
        working-directory: ./demoSite
        run: |
          pip install -r requirements-dev.txt
          python -m pytest tests/test_server.py -q

  test:
    runs-on: ubuntu-latest
    needs: [lint, unit-tests]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Test setup script
        env:
          # Smoke-test against the stock released core (instantly pullable); the
          # GoAT-from-main image is verified separately and isn't needed here.
          KROKI_CORE_IMAGE: yuzutech/kroki:0.30.1
        run: |
          chmod +x ./setup-kroki-server.sh
          ./setup-kroki-server.sh start
          sleep 30
          # Use the HTTPS_PORT from .env file (default 8443)
          HTTPS_PORT=$(grep HTTPS_PORT .env | cut -d '=' -f2 | tr -d ' ' || echo "8443")
          curl -k -s -o /dev/null -w "%{http_code}" https://localhost:${HTTPS_PORT} | grep -q "200"
          ./setup-kroki-server.sh stop
  demo-site-container:
    name: Build Demo Site Docker Image
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/demosite
          # No bare "latest" here: release.yml owns the latest tag on version
          # releases; main-branch CI builds must not clobber it.
          tags: |
            type=semver,pattern={{version}}
            type=ref,event=branch
            type=sha,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./demoSite
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Add caching to improve build times
          cache-from: type=gha
          cache-to: type=gha,mode=max
