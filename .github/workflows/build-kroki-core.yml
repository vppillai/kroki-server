name: Build Kroki core (GoAT) image

# Builds the Kroki "core" image from upstream main — which includes GoAT
# (PR #2033), not present in any released yuzutech/kroki image — and publishes a
# MULTI-ARCH (amd64 + arm64) image to GHCR so deployments on either architecture
# can `docker-compose up` without a local source build. Each arch is built on a
# native runner (no QEMU) and pushed as :goat-<arch>; a merge job stitches them
# into the multi-arch ghcr.io/<owner>/kroki-core:goat manifest that
# docker-compose.yml references.
#
# Run manually (Actions -> Run workflow) or on the weekly schedule. After the
# first run, make the GHCR package public (Packages -> settings) or have
# deployers `docker login ghcr.io` so the pull works.

on:
  workflow_dispatch:
    inputs:
      kroki_ref:
        description: "Kroki git ref to build (commit/branch/tag that includes GoAT)"
        required: false
        default: "1d20d1d6e518a6c2eab4c44bbf50b02802b94561"
  schedule:
    - cron: "0 6 * * 1"  # weekly, Mondays 06:00 UTC — track upstream main

permissions:
  contents: read
  packages: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            platform: linux/amd64
            arch: amd64
          - runner: ubuntu-24.04-arm
            platform: linux/arm64
            arch: arm64
    runs-on: ${{ matrix.runner }}
    env:
      KROKI_REF: ${{ github.event.inputs.kroki_ref || '1d20d1d6e518a6c2eab4c44bbf50b02802b94561' }}
    steps:
      - name: Lowercase owner
        run: echo "OWNER=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"

      - name: Checkout Kroki source
        uses: actions/checkout@v6
        with:
          repository: yuzutech/kroki
          ref: ${{ env.KROKI_REF }}
          path: kroki

      - name: Verify GoAT is present at this ref
        working-directory: kroki
        run: test -f server/src/main/java/io/kroki/server/service/Goat.java

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Build server jar (phase 1)
        working-directory: kroki
        run: ./mvnw -B --no-transfer-progress -DskipTests -f server/pom.xml clean package

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push per-arch image (phase 2 — bake, native build)
        working-directory: kroki
        env:
          PLATFORM: ${{ matrix.platform }}
          ARCH: ${{ matrix.arch }}
        run: |
          docker buildx bake kroki \
            --set "kroki.platform=${PLATFORM}" \
            --set "kroki.tags=ghcr.io/${OWNER}/kroki-core:goat-${ARCH}" \
            --push

  merge:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Lowercase owner
        run: echo "OWNER=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create multi-arch manifest :goat from the per-arch images
        run: |
          docker buildx imagetools create \
            -t "ghcr.io/${OWNER}/kroki-core:goat" \
            "ghcr.io/${OWNER}/kroki-core:goat-amd64" \
            "ghcr.io/${OWNER}/kroki-core:goat-arm64"
          docker buildx imagetools inspect "ghcr.io/${OWNER}/kroki-core:goat"
