name: Build Kroki core (GoAT) image

# Builds the Kroki "core" image from upstream main — which includes GoAT
# (PR #2033), not present in any released yuzutech/kroki image — and publishes
# it to GHCR so deployments can `docker-compose up` without a local source build.
#
# Run manually (Actions tab -> Run workflow) or on the weekly schedule.
# The published image is referenced by docker-compose.yml as
#   ghcr.io/${owner}/kroki-core:goat
# After the first successful run, make the package public (Packages -> settings)
# or have deployers `docker login ghcr.io` so the pull works unauthenticated.

on:
  workflow_dispatch:
    inputs:
      kroki_ref:
        description: "Kroki git ref to build (commit/branch/tag that includes GoAT)"
        required: false
        default: "1d20d1d6e518a6c2eab4c44bbf50b02802b94561"
  schedule:
    - cron: "0 6 * * 1"  # weekly, Mondays 06:00 UTC — track upstream main

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    env:
      KROKI_REF: ${{ github.event.inputs.kroki_ref || '1d20d1d6e518a6c2eab4c44bbf50b02802b94561' }}
    steps:
      - name: Checkout Kroki source
        uses: actions/checkout@v4
        with:
          repository: yuzutech/kroki
          ref: ${{ env.KROKI_REF }}
          path: kroki

      - name: Verify GoAT is present at this ref
        working-directory: kroki
        run: test -f server/src/main/java/io/kroki/server/service/Goat.java

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Build server jar (phase 1)
        working-directory: kroki
        run: ./mvnw -B --no-transfer-progress -DskipTests -f server/pom.xml clean package

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase owner
        id: owner
        run: echo "name=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Build & push core image (phase 2 — bake)
        working-directory: kroki
        env:
          OWNER: ${{ steps.owner.outputs.name }}
          # KROKI_REF is a job-level env; referenced as a shell var (no ${{ }} in run).
        run: |
          docker buildx bake kroki \
            --set "kroki.tags=ghcr.io/${OWNER}/kroki-core:goat" \
            --set "kroki.tags=ghcr.io/${OWNER}/kroki-core:${KROKI_REF}" \
            --push
