services:
  core:
    restart: unless-stopped
    # Kroki core built from main for GoAT support (GoAT is not in any released
    # image yet). Published to GHCR by .github/workflows/build-kroki-core.yml, so
    # `docker-compose up` just pulls it. To build locally instead (offline / no
    # registry access), run ./build-kroki-core.sh (it produces this exact tag).
    # Override KROKI_CORE_IMAGE to use the stock released core (e.g. CI smoke
    # tests set yuzutech/kroki:0.30.1, which has no GoAT but pulls instantly).
    image: ${KROKI_CORE_IMAGE:-ghcr.io/vppillai/kroki-core:goat}
    environment:
      - KROKI_MAX_URI_LENGTH=8192
      - KROKI_MERMAID_HOST=mermaid
      - KROKI_BPMN_HOST=bpmn
      - KROKI_EXCALIDRAW_HOST=excalidraw
      - KROKI_DIAGRAMSNET_HOST=diagramsnet
    # Internal only — reachable via nginx (core:8000), never published to the host.
    expose:
      - "8000"
    networks:
      - kroki_network
    deploy:
      resources:
        limits:
          cpus: "${CORE_CPU_LIMIT:-0}"
          memory: "${CORE_MEM_LIMIT:-0}"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  mermaid:
    restart: unless-stopped
    image: yuzutech/kroki-mermaid:0.30.1
    expose:
      - "8002"
    networks:
      - kroki_network
    deploy:
      resources:
        limits:
          cpus: "${MERMAID_CPU_LIMIT:-0}"
          memory: "${MERMAID_MEM_LIMIT:-0}"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  bpmn:
    restart: unless-stopped
    image: yuzutech/kroki-bpmn:0.30.1
    profiles: ["companions", "bpmn"]
    expose:
      - "8003"
    networks:
      - kroki_network
    deploy:
      resources:
        limits:
          cpus: "${BPMN_CPU_LIMIT:-0}"
          memory: "${BPMN_MEM_LIMIT:-0}"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  excalidraw:
    restart: unless-stopped
    image: yuzutech/kroki-excalidraw:0.30.1
    profiles: ["companions", "excalidraw"]
    expose:
      - "8004"
    networks:
      - kroki_network
    deploy:
      resources:
        limits:
          cpus: "${EXCALIDRAW_CPU_LIMIT:-0}"
          memory: "${EXCALIDRAW_MEM_LIMIT:-0}"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  diagramsnet:
    restart: unless-stopped
    image: yuzutech/kroki-diagramsnet:0.30.1
    profiles: ["companions", "diagramsnet"]
    expose:
      - "8005"
    networks:
      - kroki_network
    deploy:
      resources:
        limits:
          cpus: "${DIAGRAMSNET_CPU_LIMIT:-0}"
          memory: "${DIAGRAMSNET_MEM_LIMIT:-0}"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  demosite:
    restart: unless-stopped
    stop_grace_period: 35s
    image: kroki-demosite:latest
    expose:
      - "${DEMOSITE_CONTAINER_PORT:-8006}"
    environment:
      - PORT=${DEMOSITE_CONTAINER_PORT:-8006}
    env_file:
      - .env
    networks:
      - kroki_network
    deploy:
      resources:
        limits:
          cpus: "${DEMOSITE_CPU_LIMIT:-0}"
          memory: "${DEMOSITE_MEM_LIMIT:-0}"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  nginx:
    restart: unless-stopped
    image: nginx:1.28-alpine
    depends_on:
      - core
      - demosite
    ports:
      - "${HTTPS_PORT:-8443}:8443"
    volumes:
      - ./nginx-certs:/etc/nginx/certs:ro
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - kroki_network
    deploy:
      resources:
        limits:
          cpus: "${NGINX_CPU_LIMIT:-0}"
          memory: "${NGINX_MEM_LIMIT:-0}"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  kroki_network:
    driver: bridge
